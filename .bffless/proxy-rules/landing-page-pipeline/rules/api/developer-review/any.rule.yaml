targetUrl: ""
order: 7
pipeline:
  name: Developer Review Handler
  description: Collects developer reviews/testimonials for CE
  steps:
    - id: step_validate
      name: validate
      handler: form_handler
      config:
        fields:
          rating:
            type: number
            required: true
          review:
            type: string
            required: true
        honeypotField: website
      isEnabled: true
    - id: step_create_record
      name: create_record
      handler: data_create
      config:
        fields:
          name: request.body.name
          role: request.body.role
          email: request.body.email
          rating: request.body.rating
          review: request.body.review
          source: request.body.source
          company: request.body.company
          visible: request.body.visible
          use_case: request.body.use_case
          github_handle: request.body.github_handle
          permission_to_display: request.body.permission_to_display
        schemaId: $schema:developer_reviews
      isEnabled: true
    - id: step_send_email
      name: send_email
      handler: email_handler
      config:
        to: james.charlesworth@bffless.com
        body: "<!DOCTYPE html><html><head><style>body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; line-height: 1.6; color: #333; } .container { max-width: 600px; margin: 0 auto; padding: 20px; } .header { border-bottom: 2px solid #007bff; padding-bottom: 10px; margin-bottom: 20px; } .field { margin-bottom: 15px; } .label { font-weight: 600; color: #555; } .value { margin-top: 5px; } .stars { font-size: 24px; color: #f59e0b; } .footer { margin-top: 30px; padding-top: 15px; border-top: 1px solid #eee; font-size: 12px; color: #888; }</style></head><body><div class=\"container\"><div class=\"header\"><h2>New Developer Review</h2><div class=\"stars\">Rating: {{request.body.rating}}/5</div></div><div class=\"field\"><div class=\"label\">Name</div><div class=\"value\">{{request.body.name}}</div></div><div class=\"field\"><div class=\"label\">Email</div><div class=\"value\">{{request.body.email}}</div></div><div class=\"field\"><div class=\"label\">GitHub</div><div class=\"value\">{{request.body.github_handle}}</div></div><div class=\"field\"><div class=\"label\">Role</div><div class=\"value\">{{request.body.role}}</div></div><div class=\"field\"><div class=\"label\">Company</div><div class=\"value\">{{request.body.company}}</div></div><div class=\"field\"><div class=\"label\">Use Case</div><div class=\"value\">{{request.body.use_case}}</div></div><div class=\"field\"><div class=\"label\">Review</div><div class=\"value\">{{request.body.review}}</div></div><div class=\"field\"><div class=\"label\">Permission to Display</div><div class=\"value\">{{request.body.permission_to_display}}</div></div><div class=\"footer\">Submitted via {{metadata.path}}</div></div></body></html>"
        subject: New Developer Review ({{request.body.rating}}/5) from {{request.body.name}}
      isEnabled: true
description: Developer review/testimonial submission
